name: Build & Export Docker Images for Offline Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  export-image:
    name: Export ${{ matrix.artifact }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: insurance-api-gateway
            image: insurance/api-gateway:latest
            service: api-gateway
            mode: build
          - artifact: insurance-cache-api
            image: insurance/cache-api:latest
            service: cache-api
            mode: build
          - artifact: insurance-graph-service
            image: insurance/graph-service:latest
            service: graph-service
            mode: build
          - artifact: insurance-inventory-api
            image: insurance/inventory-api:latest
            service: inventory-api
            mode: build
          - artifact: insurance-inventory-dashboard
            image: insurance/inventory-dashboard:latest
            service: inventory-dashboard
            mode: build
          - artifact: insurance-user-api
            image: insurance/user-api:latest
            service: user-api
            mode: build
          - artifact: postgres
            image: postgres:16
            mode: pull
          - artifact: pgadmin
            image: dpage/pgadmin4:latest
            mode: pull
          - artifact: redis-stack
            image: redis/redis-stack:latest
            mode: pull
          - artifact: rabbitmq
            image: rabbitmq:3-management
            mode: pull
          - artifact: consul
            image: hashicorp/consul:1.19
            mode: pull
          - artifact: elasticsearch
            image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
            mode: pull
          - artifact: kibana
            image: docker.elastic.co/kibana/kibana:8.13.4
            mode: pull
          - artifact: apm-server
            image: docker.elastic.co/apm/apm-server:8.13.4
            mode: pull
          - artifact: neo4j
            image: neo4j:5
            mode: pull

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show disk space
        run: df -h

      - name: Validate docker compose
        run: docker compose config

      - name: Build application image
        if: matrix.mode == 'build'
        run: docker compose build ${{ matrix.service }}

      - name: Pull infrastructure image
        if: matrix.mode == 'pull'
        run: docker pull ${{ matrix.image }}

      - name: Save image as tar.gz
        run: |
          set -euo pipefail
          mkdir -p docker-image
          echo "${{ matrix.image }}" > docker-image/image.txt
          docker image inspect "${{ matrix.image }}" > /dev/null
          docker save "${{ matrix.image }}" | gzip > "docker-image/${{ matrix.artifact }}.tar.gz"
          test -s "docker-image/${{ matrix.artifact }}.tar.gz"
          ls -lh docker-image

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.artifact }}
          path: docker-image/
          if-no-files-found: error
          retention-days: 7


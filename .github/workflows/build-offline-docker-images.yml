name: Build & Push Changed Docker Images

on:
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: Push detected images to GHCR after build
        required: true
        default: true
        type: boolean
      build_scope:
        description: Build only changed services or rebuild all dockerized services
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all
      compare_ref:
        description: Optional git ref or SHA to diff against when build_scope is changed
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_to_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect, build and optionally push changed images
        shell: bash
        env:
          PUSH_TO_GHCR: ${{ inputs.push_to_ghcr }}
          BUILD_SCOPE: ${{ inputs.build_scope }}
          COMPARE_REF: ${{ inputs.compare_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          all_services=(
            cache-api
            user-api
            inventory-api
            graph-service
            api-gateway
            inventory-dashboard
            file-service
          )

          shared_change_prefixes=(
            "_Framework/"
            "fx/"
          )

          shared_change_files=(
            "Directory.Build.props"
            "Directory.Packages.props"
            "global.json"
            "NuGet.config"
            "Insurance.slnx"
            "docker-compose.yml"
            ".github/workflows/build-offline-docker-images.yml"
          )

          diff_base=""
          if [[ "${BUILD_SCOPE}" == "all" ]]; then
            diff_base="all"
          elif [[ -n "${COMPARE_REF}" ]]; then
            diff_base="$(git rev-parse "${COMPARE_REF}")"
          else
            git fetch origin "${DEFAULT_BRANCH}" --depth=1 >/dev/null 2>&1 || true
            if [[ "${CURRENT_BRANCH}" != "${DEFAULT_BRANCH}" ]] && git rev-parse "origin/${DEFAULT_BRANCH}" >/dev/null 2>&1; then
              diff_base="$(git merge-base HEAD "origin/${DEFAULT_BRANCH}")"
            elif git rev-parse HEAD^ >/dev/null 2>&1; then
              diff_base="$(git rev-parse HEAD^)"
            else
              diff_base="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          declare -A selected=()
          add_service() {
            local service_name="$1"
            selected["${service_name}"]=1
          }

          if [[ "${BUILD_SCOPE}" == "all" ]]; then
            echo "Build scope is all. Rebuilding every dockerized service."
            for service_name in "${all_services[@]}"; do
              add_service "${service_name}"
            done
          else
            mapfile -t changed_files < <(git diff --name-only "${diff_base}" HEAD | sed '/^[[:space:]]*$/d')

            echo "Diff base: ${diff_base}"
            echo "Changed files:"
            printf '%s\n' "${changed_files[@]:-}"

            rebuild_all=false
            for changed_file in "${changed_files[@]}"; do
              for shared_prefix in "${shared_change_prefixes[@]}"; do
                if [[ "${changed_file}" == "${shared_prefix}"* ]]; then
                  rebuild_all=true
                  break 2
                fi
              done

              for shared_file in "${shared_change_files[@]}"; do
                if [[ "${changed_file}" == "${shared_file}" ]]; then
                  rebuild_all=true
                  break 2
                fi
              done
            done

            if [[ "${rebuild_all}" == "true" ]]; then
              echo "Shared infrastructure changed. Rebuilding all dockerized services."
              for service_name in "${all_services[@]}"; do
                add_service "${service_name}"
              done
            else
              for changed_file in "${changed_files[@]}"; do
                case "${changed_file}" in
                  app/CacheService/*|docker/cache-api.Dockerfile)
                    add_service "cache-api"
                    ;;
                  app/UserService/*|docker/user-api.Dockerfile)
                    add_service "user-api"
                    ;;
                  app/InventoryService/*|docker/inventory-api.Dockerfile)
                    add_service "inventory-api"
                    ;;
                  app/GraphService/*|docker/graph-service.Dockerfile)
                    add_service "graph-service"
                    ;;
                  agw/*|docker/api-gateway.Dockerfile)
                    add_service "api-gateway"
                    ;;
                  app/InventoryDashboard/*|docker/inventory-dashboard.Dockerfile)
                    add_service "inventory-dashboard"
                    ;;
                  app/FileService/*|docker/file-service.Dockerfile)
                    add_service "file-service"
                    ;;
                esac
              done
            fi
          fi

          services_to_build=()
          for service_name in "${all_services[@]}"; do
            if [[ -n "${selected[${service_name}]:-}" ]]; then
              services_to_build+=("${service_name}")
            fi
          done

          if [[ ${#services_to_build[@]} -eq 0 ]]; then
            echo "No dockerized services matched the current change set."
            exit 0
          fi

          echo "Detected services:"
          printf '%s\n' "${services_to_build[@]}"

          owner="$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          mkdir -p docker-image

          for service_name in "${services_to_build[@]}"; do
            echo "Building ${service_name}..."
            docker compose build "${service_name}"

            if [[ "${PUSH_TO_GHCR}" == "true" ]]; then
              ghcr_image="ghcr.io/${owner}/${service_name}:latest"
              echo "Pushing ${ghcr_image}..."
              docker tag "insurance/${service_name}:latest" "${ghcr_image}"
              docker push "${ghcr_image}"
            fi

            echo "Exporting ${service_name} archive..."
            docker save "insurance/${service_name}:latest" | gzip > "docker-image/${service_name}.tar.gz"
          done

      - name: Upload image archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-archives
          path: docker-image/*.tar.gz
          if-no-files-found: ignore

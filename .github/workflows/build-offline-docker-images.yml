name: Build & Archive Docker Images for Offline Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  UPLOAD_IMAGE_ARTIFACTS_ON_PUSH: 'true'

concurrency:
  group: docker-build-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-images:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_images: ${{ steps.set-matrix.outputs.has_images }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "build_scope=changed"
          echo "upload_image_artifacts=${{ env.UPLOAD_IMAGE_ARTIFACTS_ON_PUSH }}"

      - name: Resolve changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          separator: "\n"

      - name: Build export matrix
        id: set-matrix
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -t changed_files <<< "$CHANGED_FILES"
          mkdir -p workflow-metadata

          add_item() {
            local artifact="$1"
            local image="$2"
            local service="$3"
            matrix_items+=("{\"artifact\":\"${artifact}\",\"image\":\"${image}\",\"service\":\"${service}\",\"mode\":\"build\"}")
          }

          has_match() {
            local pattern="$1"
            for file in "${changed_files[@]}"; do
              [[ -z "$file" ]] && continue
              if [[ "$file" == $pattern ]]; then
                return 0
              fi
            done
            return 1
          }

          matrix_items=()
          shared_docker_changed=false

          if has_match "docker-compose.yml" || has_match ".dockerignore"; then
            shared_docker_changed=true
          fi

          if [[ "$shared_docker_changed" == "true" ]]; then
            add_item "insurance-api-gateway" "insurance/api-gateway:latest" "api-gateway"
            add_item "insurance-cache-api" "insurance/cache-api:latest" "cache-api"
            add_item "insurance-file-service" "insurance/file-service:latest" "file-service"
            add_item "insurance-graph-service" "insurance/graph-service:latest" "graph-service"
            add_item "insurance-inventory-api" "insurance/inventory-api:latest" "inventory-api"
            add_item "insurance-inventory-dashboard" "insurance/inventory-dashboard:latest" "inventory-dashboard"
            add_item "insurance-user-api" "insurance/user-api:latest" "user-api"
          else
            if has_match "agw/*" || has_match "docker/api-gateway.Dockerfile" || has_match "docker/consul/*"; then
              add_item "insurance-api-gateway" "insurance/api-gateway:latest" "api-gateway"
            fi

            if has_match "app/CacheService/*" || has_match "docker/cache-api.Dockerfile" || has_match "fx/*"; then
              add_item "insurance-cache-api" "insurance/cache-api:latest" "cache-api"
            fi

            if has_match "app/FileService/*" || has_match "docker/file-service.Dockerfile"; then
              add_item "insurance-file-service" "insurance/file-service:latest" "file-service"
            fi

            if has_match "app/GraphService/*" || has_match "docker/graph-service.Dockerfile" || has_match "fx/*"; then
              add_item "insurance-graph-service" "insurance/graph-service:latest" "graph-service"
            fi

            if has_match "app/InventoryService/*" || has_match "docker/inventory-api.Dockerfile" || has_match "fx/*"; then
              add_item "insurance-inventory-api" "insurance/inventory-api:latest" "inventory-api"
            fi

            if has_match "app/InventoryDashboard/*" || has_match "docker/inventory-dashboard.Dockerfile"; then
              add_item "insurance-inventory-dashboard" "insurance/inventory-dashboard:latest" "inventory-dashboard"
            fi

            if has_match "app/UserService/*" || has_match "docker/user-api.Dockerfile" || has_match "fx/*" || has_match "app/PanelPayamakService/*"; then
              add_item "insurance-user-api" "insurance/user-api:latest" "user-api"
            fi
          fi

          if [[ ${#matrix_items[@]} -eq 0 ]]; then
            jq -n \
              --arg generatedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg gitSha "$GIT_SHA" \
              --arg gitRef "$GIT_REF_NAME" \
              '{
                generatedAt: $generatedAt,
                eventName: "push",
                buildScope: "changed",
                exportImageArchives: true,
                gitSha: $gitSha,
                gitRef: $gitRef,
                items: []
              }' > workflow-metadata/changed-images.json

            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_images=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          include_json=$(printf '%s\n' "${matrix_items[@]}" | jq -cs '.')
          jq -n \
            --arg generatedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg gitSha "$GIT_SHA" \
            --arg gitRef "$GIT_REF_NAME" \
            --argjson items "$include_json" \
            '{
              generatedAt: $generatedAt,
              eventName: "push",
              buildScope: "changed",
              exportImageArchives: true,
              gitSha: $gitSha,
              gitRef: $gitRef,
              items: $items
            }' > workflow-metadata/changed-images.json

          matrix_json=$(printf '%s\n' "${matrix_items[@]}" | jq -cs '{include: .}')
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"
          echo 'has_images=true' >> "$GITHUB_OUTPUT"
          {
            echo "## Changed Image Detection"
            echo
            echo "- Event: push"
            echo "- Build scope: changed"
            echo "- Export image archives: true"
            echo
            echo "### Matrix"
            echo '```json'
            echo "${matrix_json}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload changed images manifest
        if: env.UPLOAD_IMAGE_ARTIFACTS_ON_PUSH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changed-images-manifest
          path: workflow-metadata/changed-images.json
          if-no-files-found: error
          retention-days: 7

  export-image:
    name: Export ${{ matrix.artifact }}
    needs: detect-images
    if: needs.detect-images.outputs.has_images == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-images.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show disk space
        run: df -h

      - name: Show target image details
        shell: bash
        run: |
          set -euo pipefail
          echo "artifact=${{ matrix.artifact }}"
          echo "image=${{ matrix.image }}"
          echo "service=${{ matrix.service }}"

      - name: Validate docker compose
        run: docker compose config

      - name: Build application image
        run: docker compose build ${{ matrix.service }}

      - name: Write matrix step summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Image Step"
            echo
            echo "- Artifact: ${{ matrix.artifact }}"
            echo "- Image: ${{ matrix.image }}"
            echo "- Service: ${{ matrix.service }}"
            echo "- Archive export enabled: ${{ env.UPLOAD_IMAGE_ARTIFACTS_ON_PUSH }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save image as tar.gz
        if: env.UPLOAD_IMAGE_ARTIFACTS_ON_PUSH == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docker-image
          echo "${{ matrix.image }}" > docker-image/image.txt
          docker image inspect "${{ matrix.image }}" > /dev/null
          docker save "${{ matrix.image }}" | gzip > "docker-image/${{ matrix.artifact }}.tar.gz"
          test -s "docker-image/${{ matrix.artifact }}.tar.gz"
          ls -lh docker-image

      - name: Upload image artifact
        if: env.UPLOAD_IMAGE_ARTIFACTS_ON_PUSH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.artifact }}
          path: docker-image/
          if-no-files-found: error
          retention-days: 1

  nothing-to-build:
    name: Nothing to build
    needs: detect-images
    if: needs.detect-images.outputs.has_images != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No changed microservice images
        run: echo "No changed microservice image detected for this run."

name: Build & Push Changed Docker Images

on:
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: 'Push changed images to GHCR'
        required: true
        default: 'true'

jobs:
  detect-and-build:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.detect.outputs.changed-images }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1️⃣ تشخیص سرویس‌های تغییر کرده
      - name: Detect changed services
        id: detect
        run: |
          CHANGED_SERVICES=$(git diff --name-only HEAD~1 HEAD | grep -E '^services/[^/]+/' | cut -d/ -f2 | sort | uniq)
          echo "Changed services: $CHANGED_SERVICES"
          echo "changed-images=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

  build-and-push:
    needs: detect-and-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [${{ fromJSON(needs.detect-and-build.outputs.images) }}]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Login به GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 3️⃣ Build ایمیج تغییر کرده
      - name: Build Docker image
        run: |
          docker compose build ${{ matrix.image }}

      # 4️⃣ Push اختیاری به GHCR
      - name: Push to GHCR (if selected)
        if: ${{ github.event.inputs.push_to_ghcr == 'true' }}
        run: |
          docker tag insurance/${{ matrix.image }}:latest ghcr.io/supectofficial-rgb/${{ matrix.image }}:latest
          docker push ghcr.io/supectofficial-rgb/${{ matrix.image }}:latest
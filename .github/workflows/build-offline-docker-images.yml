name: Build & Push Changed Docker Images

on:
  workflow_dispatch:
    inputs:
      push_to_ghcr:
        description: 'Push changed images to GHCR after build'
        required: true
        default: 'true'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Detect changed microservices
      - name: Detect changed services
        id: detect
        run: |
          # فرض بر اینه که همه microservices در فولدر services/ قرار دارند
          CHANGED_SERVICES=$(git diff --name-only HEAD~1 HEAD | grep -E '^services/[^/]+/' | cut -d/ -f2 | sort | uniq)
          echo "Changed services: $CHANGED_SERVICES"
          echo "changed=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

      # 3️⃣ Login به GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 4️⃣ Build و push ایمیج‌های تغییر کرده
      - name: Build and optionally push changed images
        run: |
          if [ -z "${{ steps.detect.outputs.changed }}" ]; then
            echo "No changed services detected. Exiting."
            exit 0
          fi

          for service in ${{ steps.detect.outputs.changed }}; do
            echo "Building $service..."
            docker compose build $service

            if [ "${{ github.event.inputs.push_to_ghcr }}" == "true" ]; then
              echo "Pushing $service to GHCR..."
              docker tag insurance/$service:latest ghcr.io/supectofficial-rgb/$service:latest
              docker push ghcr.io/supectofficial-rgb/$service:latest
            fi
          done

      # 5️⃣ Optional: Export tar.gz برای backup
      - name: Export changed Docker images to tar.gz
        run: |
          mkdir -p docker-image
          for service in ${{ steps.detect.outputs.changed }}; do
            docker save insurance/$service | gzip > docker-image/$service.tar.gz
          done